    <script>
      //loader disappear after page is loaded
      //I dont actually know much about vanilla JS, so I followed this short on-hand tutorial about 'load' event listener

      window.addEventListener('load', function() {
        const loader = document.getElementById('loader');
        loader.style.display = 'none';
      });
    </script>
